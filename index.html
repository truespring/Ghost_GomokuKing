<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | MiddleProject</title>
    <style>
      /* 전체 화면을 꽉 채우고 스크롤바를 제거합니다. */
      body { margin: 0; padding: 0; overflow: hidden; background: #231F20; }
      #unity-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
      #unity-canvas { width: 100%; height: 100%; background: #231F20; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <script src="Build/WebGL Builds.loader.js"></script>
    <script>
      const canvas = document.querySelector("#unity-canvas");

      // 가로세로 비율 유지 여부에 따라 설정을 선택하세요.
      // 1. 비율을 무시하고 꽉 채우려면 아래 함수를 그대로 둡니다.
      // 2. 16:12(4:3) 비율을 유지하고 싶다면 CSS에서 aspect-ratio를 활용하세요.
      function resizeCanvas() {
        // 모바일 여부 확인
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
          var meta = document.createElement('meta');
          meta.name = 'viewport';
          meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
          document.getElementsByTagName('head')[0].appendChild(meta);
        }
      }

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/WebGL Builds.data.unityweb",
        frameworkUrl: "Build/WebGL Builds.framework.js.unityweb",
        codeUrl: "Build/WebGL Builds.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "MiddleProject",
        productVersion: "1.0",
        // 아래 설정을 활성화하면 캔버스 크기가 조절될 때 렌더링 해상도도 함께 조절됩니다.
        devicePixelRatio: window.devicePixelRatio || 1,
      }).then((unityInstance) => {
        // 필요한 경우 추가 로직
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
