<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | MiddleProject</title>
    <style>
      /* 전체 페이지 설정 */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        overflow: hidden;
        background: #231F20;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /*
        800x600 (4:3) 비율을 유지하면서 화면에 꽉 맞게 스케일합니다.
        - aspect-ratio로 4:3 비율 고정
        - width/height를 vw/vh 중 더 작은 쪽에 맞춤
        - 남는 공간은 배경색(#231F20)으로 채워짐
      */
      #unity-container {
        position: relative;
        /* 4:3 비율 유지 */
        aspect-ratio: 4 / 3;
        /* 화면 너비와 높이 중 비율에 맞는 쪽에 맞춤 */
        width: min(100vw, calc(100vh * 4 / 3));
        height: min(100vh, calc(100vw * 3 / 4));
      }

      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: #231F20;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <script src="Build/WebGL Builds.loader.js"></script>
    <script>
      const canvas = document.querySelector("#unity-canvas");

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/WebGL Builds.data.unityweb",
        frameworkUrl: "Build/WebGL Builds.framework.js.unityweb",
        codeUrl: "Build/WebGL Builds.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "MiddleProject",
        productVersion: "1.0",
        devicePixelRatio: 1,
      }).then((unityInstance) => {
        // 필요한 경우 추가 로직
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
